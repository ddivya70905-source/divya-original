<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        .page-header h2 {
            font-size: 2.5rem;
            color: var(--primary-color);
            display: inline-block;
            position: relative;
        }
        .page-header h2::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 3px;
            background-color: var(--primary-color);
            bottom: -5px;
            left: 25%;
            border-radius: 2px;
        }
        .contact-container {
            display: flex;
            gap: 4rem;
            max-width: 1000px;
            margin: 0 auto;
        }
        .contact-info {
            flex: 1;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }
        .info-item:hover {
            transform: translateX(10px);
            border-color: var(--primary-color);
        }
        .info-icon {
            font-size: 2rem;
            color: var(--primary-color);
            width: 50px;
            text-align: center;
        }
        .info-content h4 {
            margin-bottom: 0.25rem;
            color: var(--text-color);
        }
        .info-content p, .info-content a {
            color: var(--secondary-color);
            margin: 0;
            transition: color 0.3s ease;
        }
        .info-content a:hover {
            color: var(--primary-color);
        }
        
        .contact-form {
            flex: 1.5;
            background-color: var(--card-bg);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-color);
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: inherit;
            transition: var(--transition);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }
        
        @media (max-width: 768px) {
            .contact-container {
                flex-direction: column;
            }
            .contact-form {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-layer-group"></i> Portfolio</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="education.html">Education</a></li>
                <li><a href="certifications.html">Certifications</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="container">
        <div class="page-header" data-aos="fade-up">
            <h2>Get In Touch</h2>
            <p style="margin-top: 1rem;">Have a question or want to work together? Leave a message.</p>
        </div>

        <div class="contact-container">
            <div class="contact-info" data-aos="fade-right">
                <div class="info-item">
                    <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                    <div class="info-content">
                        <h4>Email</h4>
                        <a href="mailto:monisha@example.com">monisha@example.com</a>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                    <div class="info-content">
                        <h4>Location</h4>
                        <p>City, Country</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                    <div class="info-content">
                        <h4>Phone</h4>
                        <p>+1 234 567 8900</p>
                    </div>
                </div>
            </div>

            <div class="contact-form" data-aos="fade-left">
                <!-- Using action="mailto:" for simple integration as requested -->
                <form action="mailto:monisha@example.com" method="post" enctype="text/plain">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" class="form-control" required placeholder="Hello..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fa-regular fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="social-links">
                <a href="#"><i class="fa-brands fa-github"></i></a>
                <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                <a href="#"><i class="fa-solid fa-envelope"></i></a>
            </div>
            <p class="footer-text">&copy; 2026 Monisha S. All rights reserved.</p>
        </div>
    </footer>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
